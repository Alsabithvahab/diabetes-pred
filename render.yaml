services:
  # 1. ML Service (Python/Flask)
  - type: web
    name: diabetes-ml-service
    env: python
    buildCommand: pip install -r ml-service/requirements.txt
    startCommand: gunicorn --chdir ml-service app:app
    envVars:
      - key: PORT
        value: 5000

  # 2. Backend Service (Node.js/Express)
  - type: web
    name: diabetes-backend
    env: node
    buildCommand: npm install --prefix backend
    startCommand: node backend/server.js
    envVars:
      - key: MONGO_URI
        sync: false # User needs to set this in Render UI
      - key: JWT_SECRET
        generateValue: true
      - key: ML_SERVICE_URL
        fromService:
          name: diabetes-ml-service
          type: web
          property: host
      - key: PORT
        value: 5001

